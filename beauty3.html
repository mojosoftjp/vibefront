<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アートフル・コード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');

  :root {
    --bg-base: #0a0a0a;
    --bg-surface: #141414;
    --bg-surface-hover: #1f1f1f;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent-color: #00f2fe;
    --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    --border-color: rgba(255, 255, 255, 0.08);
    --font-main: 'Inter', 'Noto Sans JP', sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-main);
    background-color: var(--bg-base);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1920&q=80');
    background-size: cover;
    background-position: center;
    opacity: 0.4; /* ここの数値を 0.0〜1.0 の間で調整すると濃さが変わります */
    mix-blend-mode: screen;
    z-index: -1;
    pointer-events: none;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 5%;
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1000;
    border-bottom: 1px solid var(--border-color);
    transition: all 0.3s ease;
  }

  .logo {
    font-size: 1.75rem;
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--text-primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo span {
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .nav {
    display: flex;
    gap: 2.5rem;
  }

  .nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    transition: color 0.3s ease;
    position: relative;
  }

  .nav a:hover {
    color: var(--text-primary);
  }

  .nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -4px;
    left: 0;
    background: var(--accent-gradient);
    transition: width 0.3s ease;
  }

  .nav a:hover::after {
    width: 100%;
  }

  /* Hero Section */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    padding: 8rem 5% 2rem;
    align-items: center;
    max-width: 1400px;
    margin: 0 auto;
  }

  .hero-image-wrapper {
    position: relative;
    width: max-content;
    max-width: 100%;
    margin: 0 auto;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0, 242, 254, 0.15);
    transform: perspective(1000px) rotateY(5deg);
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .hero-image-wrapper:hover {
    transform: perspective(1000px) rotateY(0deg) translateY(-10px);
  }

  .hero-image-wrapper::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 24px;
    z-index: 2;
    pointer-events: none;
  }

  .hero-image-wrapper img {
    max-width: 100%;
    height: auto;
    display: block;
    filter: contrast(1.1) saturate(1.2);
    transition: transform 0.7s ease;
  }

  .hero-image-wrapper:hover img {
    transform: scale(1.05);
  }

  .hero-content h1 {
    font-size: clamp(1.5rem, 3.5vw, 3rem); /* 1行に収まるように文字サイズを調整 */
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 1.5rem;
    letter-spacing: -0.03em;
  }

  .hero-content h1 span {
    display: block;
    background: var(--accent-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-content p {
    font-size: 1.125rem;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    max-width: 90%;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2.5rem;
    font-size: 1rem;
    font-weight: 700;
    color: var(--bg-base);
    background: var(--accent-gradient);
    border-radius: 50px;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 30px rgba(0, 242, 254, 0.4);
  }

  /* Features Section */
  .features {
    padding: 2rem 5% 4rem;
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2.5rem;
  }

  .feature-card {
    background: var(--bg-surface);
    padding: 3rem 2.5rem;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
  }

  .feature-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at top right, rgba(0, 242, 254, 0.1), transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .feature-card:hover {
    transform: translateY(-15px);
    background: var(--bg-surface-hover);
    border-color: rgba(0, 242, 254, 0.3);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  .feature-card:hover::before {
    opacity: 1;
  }

  .icon-wrapper {
    width: 60px;
    height: 60px;
    background: rgba(0, 242, 254, 0.1);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    color: var(--accent-color);
    transition: transform 0.3s ease;
  }

  .feature-card:hover .icon-wrapper {
    transform: scale(1.1) rotate(5deg);
  }

  .icon-wrapper svg {
    width: 28px;
    height: 28px;
  }

  .feature-card h3 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    color: var(--text-primary);
  }

  .feature-card p {
    color: var(--text-secondary);
    font-size: 1rem;
    margin-bottom: 2rem;
    line-height: 1.7;
  }

  .feature-link {
    display: inline-flex;
    align-items: center;
    color: var(--text-primary);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 600;
    transition: color 0.3s ease;
    position: relative;
    z-index: 1;
  }

  .feature-link:hover {
    color: var(--accent-color);
  }

  .feature-link svg {
    width: 16px;
    height: 16px;
    margin-left: 0.5rem;
    transition: transform 0.3s ease;
  }

  .feature-link:hover svg {
    transform: translateX(5px);
  }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border-color);
    padding: 4rem 5% 2rem;
    text-align: center;
    background: var(--bg-base);
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg-surface);
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    transition: all 0.3s ease;
  }

  .socials a:hover {
    color: var(--bg-base);
    background: var(--accent-color);
    border-color: var(--accent-color);
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
  }

  .socials svg {
    width: 20px;
    height: 20px;
  }

  .copyright {
    color: var(--text-secondary);
    font-size: 0.875rem;
    font-weight: 500;
  }

  /* Responsive Design */
  @media (max-width: 1024px) {
    .hero {
      gap: 3rem;
      padding-top: 7rem;
    }
  }

  @media (max-width: 768px) {
    .header {
      flex-direction: column;
      padding: 1rem 5%;
      gap: 1rem;
    }
    
    .nav {
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero {
      grid-template-columns: 1fr;
      text-align: center;
      padding-top: 6rem;
      padding-bottom: 1rem;
      gap: 3rem;
    }

    .hero-image-wrapper {
      order: -1;
      width: max-content;
      max-width: 100%;
      margin: 0 auto;
      transform: none;
    }

    .hero-image-wrapper:hover {
      transform: translateY(-10px);
    }

    .hero-content p {
      max-width: 100%;
      margin-left: auto;
      margin-right: auto;
    }

    .features {
      padding-top: 2rem;
    }
  }
</style>
</head>
